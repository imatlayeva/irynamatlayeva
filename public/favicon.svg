<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- фон -->
  <circle cx="16" cy="16" r="16" fill="#F7F4ED"/>
  <!-- тонке оливкове кільце -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="#828B6E" stroke-width="0.6" opacity="0.4"/>
  <!-- І — вертикальна риска + верхня і нижня горизонтальні -->
  <line x1="8"   y1="10.5" x2="8"   y2="21.5" stroke="#3A3F2E" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="5.5" y1="10.5" x2="10.5" y2="10.5" stroke="#3A3F2E" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="5.5" y1="21.5" x2="10.5" y2="21.5" stroke="#3A3F2E" stroke-width="1.4" stroke-linecap="round"/>
  <!-- М — дві вертикальні + V всередині -->
  <line x1="13" y1="21.5" x2="13"   y2="10.5" stroke="#3A3F2E" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="13" y1="10.5" x2="16"   y2="16.5" stroke="#3A3F2E" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="16" y1="16.5" x2="19"   y2="10.5" stroke="#3A3F2E" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="19" y1="10.5" x2="19"   y2="21.5" stroke="#3A3F2E" stroke-width="1.4" stroke-linecap="round"/>
  <!-- терракотова крапка-акцент -->
  <circle cx="24" cy="21" r="1.6" fill="#B8694A" opacity="0.75"/>
</svg>